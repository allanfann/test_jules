version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./firebase-credentials.json:/app/firebase-credentials.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-credentials.json
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
